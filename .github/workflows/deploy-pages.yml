# Deploy the static docs/ site to GitHub Pages via the Actions pipeline
# (replaces the deprecated legacy branch-based Jekyll build).
# ONE-TIME: repo Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".
name: Deploy docs to Pages

on:
  push:
    branches: [main]
    paths: ["docs/**", ".github/workflows/deploy-pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
